services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: mengxuegushi
      POSTGRES_USER: mengxuegushi
      POSTGRES_PASSWORD: mengxuegushi
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mengxuegushi -d mengxuegushi"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  api:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      DATABASE_URL: postgres://mengxuegushi:mengxuegushi@postgres:5432/mengxuegushi
      AUDIO_DIR: /app/audios
      ENABLE_DEV_LOGIN: "true"
    volumes:
      - /path/to/workspace/mengxue-gushi/audios:/app/audios:ro
    restart: unless-stopped

volumes:
  postgres-data:
